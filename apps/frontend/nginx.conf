# Uncomment the `upstream` block below and the `/api/` location inside `server`
# when frontend + backend run in the same docker-compose (service name `backend`).
# This makes the browser see same-origin and removes CORS entirely.
# upstream backend_upstream {
#   server backend:3000;
# }

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # client_max_body_size 25m;

  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # location /api/ {
  #   proxy_pass http://backend_upstream/;
  #   proxy_http_version 1.1;
  #   proxy_set_header Host $host;
  #   proxy_set_header X-Real-IP $remote_addr;
  #   proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  #   proxy_set_header X-Forwarded-Proto $scheme;
  #   proxy_set_header Upgrade $http_upgrade;
  #   proxy_set_header Connection "upgrade";
  #   proxy_read_timeout 60s;
  # }

  location ~* \.(?:js|css|woff2?|ttf|otf|eot|ico|svg|png|jpg|jpeg|gif|webp|avif)$ {
    expires 1y;
    access_log off;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }
}
