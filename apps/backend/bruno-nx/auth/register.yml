info:
  name: register
  type: http
  seq: 2

http:
  method: POST
  url: http://localhost:3000/api/auth/register
  body:
    type: json
    data: |-
      {
        "email": {{USER_EMAIL}},
        "password": {{PASSWORD}},
        "confirmPassword":  {{PASSWORD}}
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
