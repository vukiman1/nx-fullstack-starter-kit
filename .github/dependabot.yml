version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    target-branch: 'dev'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '06:00'
      timezone: 'Asia/Ho_Chi_Minh'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
      - 'scope/deps'
    commit-message:
      prefix: 'chore'
      include: 'scope'
    versioning-strategy: 'increase'
    groups:
      production-minor-patch:
        dependency-type: 'production'
        update-types:
          - 'minor'
          - 'patch'
      development-minor-patch:
        dependency-type: 'development'
        update-types:
          - 'minor'
          - 'patch'

  - package-ecosystem: 'github-actions'
    directory: '/'
    target-branch: 'dev'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '06:00'
      timezone: 'Asia/Ho_Chi_Minh'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
      - 'scope/ci'
    commit-message:
      prefix: 'ci'
      include: 'scope'
    groups:
      actions:
        patterns:
          - '*'

  - package-ecosystem: 'docker'
    directory: '/apps/backend'
    target-branch: 'dev'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '06:00'
      timezone: 'Asia/Ho_Chi_Minh'
    open-pull-requests-limit: 3
    labels:
      - 'dependencies'
      - 'scope/infra'
    commit-message:
      prefix: 'build'
      include: 'scope'

  - package-ecosystem: 'docker'
    directory: '/apps/frontend'
    target-branch: 'dev'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '06:00'
      timezone: 'Asia/Ho_Chi_Minh'
    open-pull-requests-limit: 3
    labels:
      - 'dependencies'
      - 'scope/infra'
    commit-message:
      prefix: 'build'
      include: 'scope'
