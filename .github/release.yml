changelog:
  exclude:
    labels:
      - status/wip
      - type/test
  categories:
    - title: Features
      labels: [type/feat]
    - title: Bug Fixes
      labels: [type/fix]
    - title: Performance
      labels: [type/perf]
    - title: Refactor
      labels: [type/refactor]
    - title: Dependencies
      labels: [dependencies, scope/deps]
    - title: Documentation
      labels: [type/docs]
    - title: Other
      labels: ['*']
